name: Авторизация
description: ''
endpoints:
  -
    httpMethods:
      - POST
    uri: api/auth/login
    metadata:
      groupName: Авторизация
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: Вход
      description: |-
        Авторизация по email и паролю. Возвращает Bearer-токен (Sanctum).

        В объекте `user` приходит роль:
        - `role`: `student` | `teacher` | `administrator`
        - `role_label`: человекочитаемое название
        - `default_path`: стартовый путь API для этой роли (`/api/student/results`, `/api/gradebooks` и т.д.)

        По роли фронтенд выбирает раздел приложения; отдельного «типа входа» нет — один endpoint для всех.
      authenticated: false
      custom: []
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      email:
        name: email
        description: 'Email пользователя.'
        required: true
        example: teacher@example.com
        type: string
        enumValues: []
        exampleWasSpecified: false
        custom: []
      password:
        name: password
        description: Пароль.
        required: true
        example: password
        type: string
        enumValues: []
        exampleWasSpecified: false
        custom: []
    cleanBodyParameters:
      email: teacher@example.com
      password: password
    fileParameters: []
    responses:
      -
        status: 200
        content: |
          {
              "data": {
                  "token": "1|exampleSanctumTokenForDocumentation",
                  "token_type": "Bearer",
                  "default_path": "/api/gradebooks",
                  "user": {
                      "id": 2,
                      "role": "teacher",
                      "role_label": "Преподаватель",
                      "first_name": "Иван",
                      "second_name": "Сергеевич",
                      "last_name": "Петров",
                      "full_name": "Петров Иван Сергеевич",
                      "email": "teacher@institute.local",
                      "email_verified_at": "2026-05-16T12:00:00+00:00",
                      "phone": null,
                      "is_active": true,
                      "default_path": "/api/gradebooks",
                      "gradebooks_count": 2,
                      "created_at": "2026-05-16T12:00:00+00:00",
                      "updated_at": "2026-05-16T12:00:00+00:00"
                  }
              }
          }
        headers: []
        description: ''
        custom: []
      -
        status: 422
        content: |
          {
              "message": "Неверный email или пароль.",
