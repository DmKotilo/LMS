openapi: 3.0.3
info:
  title: 'MRC API'
  description: 'REST API учебного портала (LMS). Роли: студент, преподаватель, администратор.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8085'
paths:
  /api/auth/login:
    post:
      summary: Вход
      operationId: ''
      description: "Авторизация по email и паролю. Возвращает Bearer-токен (Sanctum).\n\nВ объекте `user` приходит роль:\n- `role`: `student` | `teacher` | `administrator`\n- `role_label`: человекочитаемое название\n- `default_path`: стартовый путь API для этой роли (`/api/student/results`, `/api/gradebooks` и т.д.)\n\nПо роли фронтенд выбирает раздел приложения; отдельного «типа входа» нет — один endpoint для всех."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    token: 1|exampleSanctumTokenForDocumentation
                    token_type: Bearer
                    default_path: /api/gradebooks
                    user:
                      id: 2
                      role: teacher
                      role_label: Преподаватель
                      first_name: Иван
                      second_name: Сергеевич
                      last_name: Петров
                      full_name: 'Петров Иван Сергеевич'
                      email: teacher@institute.local
                      email_verified_at: '2026-05-16T12:00:00+00:00'
                      phone: null
                      is_active: true
                      default_path: /api/gradebooks
                      gradebooks_count: 2
                      created_at: '2026-05-16T12:00:00+00:00'
                      updated_at: '2026-05-16T12:00:00+00:00'
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|exampleSanctumTokenForDocumentation
                      token_type:
                        type: string
                        example: Bearer
                      default_path:
                        type: string
                        example: /api/gradebooks
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 2
                          role:
                            type: string
                            example: teacher
                          role_label:
                            type: string
                            example: Преподаватель
                          first_name:
                            type: string
                            example: Иван
                          second_name:
                            type: string
                            example: Сергеевич
                          last_name:
                            type: string
                            example: Петров
                          full_name:
                            type: string
                            example: 'Петров Иван Сергеевич'
                          email:
                            type: string
                            example: teacher@institute.local
                          email_verified_at:
                            type: string
                            example: '2026-05-16T12:00:00+00:00'
                          phone:
                            type: string
                            example: null
                          is_active:
                            type: boolean
                            example: true
                          default_path:
                            type: string
                            example: /api/gradebooks
                          gradebooks_count:
                            type: integer
                            example: 2
                          created_at:
                            type: string
                            example: '2026-05-16T12:00:00+00:00'
                          updated_at:
                            type: string
                            example: '2026-05-16T12:00:00+00:00'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Неверный email или пароль.'
                  errors:
                    email:
                      - 'Неверный email или пароль.'
                properties:
                  message:
                    type: string
                    example: 'Неверный email или пароль.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'Неверный email или пароль.'
                        items:
                          type: string
      tags:
        - Авторизация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Email пользователя.'
                  example: teacher@example.com
                password:
                  type: string
                  description: Пароль.
                  example: password
              required:
                - email
                - password
      security: []
  /api/auth/logout:
    post:
      summary: Выход
      operationId: ''
      description: 'Удаляет текущий токен доступа.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Выход выполнен успешно.'
                properties:
                  message:
                    type: string
                    example: 'Выход выполнен успешно.'
      tags:
        - Авторизация
  /api/auth/me:
    get:
      summary: 'Текущий пользователь'
      operationId: ''
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 3
                    role: student
                    role_label: Студент
                    first_name: Алексей
                    second_name: Дмитриевич
                    last_name: Иванов
                    full_name: 'Иванов Алексей Дмитриевич'
                    email: student@institute.local
                    email_verified_at: '2026-05-16T12:00:00+00:00'
                    phone: null
                    is_active: true
                    default_path: /api/student/results
                    student_profile:
                      student_id_number: ST-2024-0001
                      group:
                        id: 1
                        name: ИВТ-401
                        education_form: full_time
                        education_form_label: Очная
                        course: 4
                    created_at: '2026-05-16T12:00:00+00:00'
                    updated_at: '2026-05-16T12:00:00+00:00'
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 3
                      role:
                        type: string
                        example: student
                      role_label:
                        type: string
                        example: Студент
                      first_name:
                        type: string
                        example: Алексей
                      second_name:
                        type: string
                        example: Дмитриевич
                      last_name:
                        type: string
                        example: Иванов
                      full_name:
                        type: string
                        example: 'Иванов Алексей Дмитриевич'
                      email:
                        type: string
                        example: student@institute.local
                      email_verified_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      phone:
                        type: string
                        example: null
                      is_active:
                        type: boolean
                        example: true
                      default_path:
                        type: string
                        example: /api/student/results
                      student_profile:
                        type: object
                        properties:
                          student_id_number:
                            type: string
                            example: ST-2024-0001
                          group:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 1
                              name:
                                type: string
                                example: ИВТ-401
                              education_form:
                                type: string
                                example: full_time
                              education_form_label:
                                type: string
                                example: Очная
                              course:
                                type: integer
                                example: 4
                      created_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Необходима авторизация.'
                properties:
                  message:
                    type: string
                    example: 'Необходима авторизация.'
      tags:
        - Авторизация
  /api/profile:
    get:
      summary: 'Просмотр профиля'
      operationId: ''
      description: 'В ответе поле `role` (`student` | `teacher` | `administrator`) и `role_label` — текущая роль пользователя.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 3
                    role: student
                    role_label: Студент
                    first_name: Алексей
                    second_name: Дмитриевич
                    last_name: Иванов
                    full_name: 'Иванов Алексей Дмитриевич'
                    email: student@institute.local
                    email_verified_at: '2026-05-16T12:00:00+00:00'
                    phone: '+79001234567'
                    is_active: true
                    default_path: /api/student/results
                    student_profile:
                      student_id_number: ST-2024-0001
                      group:
                        id: 1
                        name: ИВТ-401
                        education_form: full_time
                        education_form_label: Очная
                        course: 4
                    created_at: '2026-05-16T12:00:00+00:00'
                    updated_at: '2026-05-16T12:00:00+00:00'
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 3
                      role:
                        type: string
                        example: student
                      role_label:
                        type: string
                        example: Студент
                      first_name:
                        type: string
                        example: Алексей
                      second_name:
                        type: string
                        example: Дмитриевич
                      last_name:
                        type: string
                        example: Иванов
                      full_name:
                        type: string
                        example: 'Иванов Алексей Дмитриевич'
                      email:
                        type: string
                        example: student@institute.local
                      email_verified_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      phone:
                        type: string
                        example: '+79001234567'
                      is_active:
                        type: boolean
                        example: true
                      default_path:
                        type: string
                        example: /api/student/results
                      student_profile:
                        type: object
                        properties:
                          student_id_number:
                            type: string
                            example: ST-2024-0001
                          group:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 1
                              name:
                                type: string
                                example: ИВТ-401
                              education_form:
                                type: string
                                example: full_time
                              education_form_label:
                                type: string
                                example: Очная
