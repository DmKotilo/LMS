openapi: 3.0.3
info:
  title: 'MRC API'
  description: 'REST API учебного портала (LMS). Роли: студент, преподаватель, администратор.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8085'
paths:
  /api/auth/login:
    post:
      summary: Вход
      operationId: ''
      description: "Авторизация по email и паролю. Возвращает Bearer-токен (Sanctum).\n\nВ объекте `user` приходит роль:\n- `role`: `student` | `teacher` | `administrator`\n- `role_label`: человекочитаемое название\n- `default_path`: стартовый путь API для этой роли (`/api/student/results`, `/api/gradebooks` и т.д.)\n\nПо роли фронтенд выбирает раздел приложения; отдельного «типа входа» нет — один endpoint для всех."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    token: 1|exampleSanctumTokenForDocumentation
                    token_type: Bearer
                    default_path: /api/gradebooks
                    user:
                      id: 2
                      role: teacher
                      role_label: Преподаватель
                      first_name: Иван
                      second_name: Сергеевич
                      last_name: Петров
                      full_name: 'Петров Иван Сергеевич'
                      email: teacher@institute.local
                      email_verified_at: '2026-05-16T12:00:00+00:00'
                      phone: null
                      is_active: true
                      default_path: /api/gradebooks
                      gradebooks_count: 2
                      created_at: '2026-05-16T12:00:00+00:00'
                      updated_at: '2026-05-16T12:00:00+00:00'
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|exampleSanctumTokenForDocumentation
                      token_type:
                        type: string
                        example: Bearer
                      default_path:
                        type: string
                        example: /api/gradebooks
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 2
                          role:
                            type: string
                            example: teacher
                          role_label:
                            type: string
                            example: Преподаватель
                          first_name:
                            type: string
                            example: Иван
                          second_name:
                            type: string
                            example: Сергеевич
                          last_name:
                            type: string
                            example: Петров
                          full_name:
                            type: string
                            example: 'Петров Иван Сергеевич'
                          email:
                            type: string
                            example: teacher@institute.local
                          email_verified_at:
                            type: string
                            example: '2026-05-16T12:00:00+00:00'
                          phone:
                            type: string
                            example: null
                          is_active:
                            type: boolean
                            example: true
                          default_path:
                            type: string
                            example: /api/gradebooks
                          gradebooks_count:
                            type: integer
                            example: 2
                          created_at:
                            type: string
                            example: '2026-05-16T12:00:00+00:00'
                          updated_at:
                            type: string
                            example: '2026-05-16T12:00:00+00:00'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Неверный email или пароль.'
                  errors:
                    email:
                      - 'Неверный email или пароль.'
                properties:
                  message:
                    type: string
                    example: 'Неверный email или пароль.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'Неверный email или пароль.'
                        items:
                          type: string
      tags:
        - Авторизация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Email пользователя.'
                  example: teacher@example.com
                password:
                  type: string
                  description: Пароль.
                  example: password
              required:
                - email
                - password
      security: []
  /api/auth/logout:
    post:
      summary: Выход
      operationId: ''
      description: 'Удаляет текущий токен доступа.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Выход выполнен успешно.'
                properties:
                  message:
                    type: string
                    example: 'Выход выполнен успешно.'
      tags:
        - Авторизация
  /api/auth/me:
    get:
      summary: 'Текущий пользователь'
      operationId: ''
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 3
                    role: student
                    role_label: Студент
                    first_name: Алексей
                    second_name: Дмитриевич
                    last_name: Иванов
                    full_name: 'Иванов Алексей Дмитриевич'
                    email: student@institute.local
                    email_verified_at: '2026-05-16T12:00:00+00:00'
                    phone: null
                    is_active: true
                    default_path: /api/student/results
                    student_profile:
                      student_id_number: ST-2024-0001
                      group:
                        id: 1
                        name: ИВТ-401
                        education_form: full_time
                        education_form_label: Очная
                        course: 4
                    created_at: '2026-05-16T12:00:00+00:00'
                    updated_at: '2026-05-16T12:00:00+00:00'
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 3
                      role:
                        type: string
                        example: student
                      role_label:
                        type: string
                        example: Студент
                      first_name:
                        type: string
                        example: Алексей
                      second_name:
                        type: string
                        example: Дмитриевич
                      last_name:
                        type: string
                        example: Иванов
                      full_name:
                        type: string
                        example: 'Иванов Алексей Дмитриевич'
                      email:
                        type: string
                        example: student@institute.local
                      email_verified_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      phone:
                        type: string
                        example: null
                      is_active:
                        type: boolean
                        example: true
                      default_path:
                        type: string
                        example: /api/student/results
                      student_profile:
                        type: object
                        properties:
                          student_id_number:
                            type: string
                            example: ST-2024-0001
                          group:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 1
                              name:
                                type: string
                                example: ИВТ-401
                              education_form:
                                type: string
                                example: full_time
                              education_form_label:
                                type: string
                                example: Очная
                              course:
                                type: integer
                                example: 4
                      created_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Необходима авторизация.'
                properties:
                  message:
                    type: string
                    example: 'Необходима авторизация.'
      tags:
        - Авторизация
  /api/profile:
    get:
      summary: 'Просмотр профиля'
      operationId: ''
      description: 'В ответе поле `role` (`student` | `teacher` | `administrator`) и `role_label` — текущая роль пользователя.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 3
                    role: student
                    role_label: Студент
                    first_name: Алексей
                    second_name: Дмитриевич
                    last_name: Иванов
                    full_name: 'Иванов Алексей Дмитриевич'
                    email: student@institute.local
                    email_verified_at: '2026-05-16T12:00:00+00:00'
                    phone: '+79001234567'
                    is_active: true
                    default_path: /api/student/results
                    student_profile:
                      student_id_number: ST-2024-0001
                      group:
                        id: 1
                        name: ИВТ-401
                        education_form: full_time
                        education_form_label: Очная
                        course: 4
                    created_at: '2026-05-16T12:00:00+00:00'
                    updated_at: '2026-05-16T12:00:00+00:00'
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 3
                      role:
                        type: string
                        example: student
                      role_label:
                        type: string
                        example: Студент
                      first_name:
                        type: string
                        example: Алексей
                      second_name:
                        type: string
                        example: Дмитриевич
                      last_name:
                        type: string
                        example: Иванов
                      full_name:
                        type: string
                        example: 'Иванов Алексей Дмитриевич'
                      email:
                        type: string
                        example: student@institute.local
                      email_verified_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      phone:
                        type: string
                        example: '+79001234567'
                      is_active:
                        type: boolean
                        example: true
                      default_path:
                        type: string
                        example: /api/student/results
                      student_profile:
                        type: object
                        properties:
                          student_id_number:
                            type: string
                            example: ST-2024-0001
                          group:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 1
                              name:
                                type: string
                                example: ИВТ-401
                              education_form:
                                type: string
                                example: full_time
                              education_form_label:
                                type: string
                                example: Очная
                              course:
                                type: integer
                                example: 4
                      created_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Необходима авторизация.'
                properties:
                  message:
                    type: string
                    example: 'Необходима авторизация.'
      tags:
        - Общее
    patch:
      summary: 'Обновление профиля'
      operationId: ''
      description: 'Можно изменить ФИО и телефон. Смена email: `POST /api/profile/email` (пароль + новый email, подтверждение по ссылке из письма).'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 3
                    role: student
                    role_label: Студент
                    first_name: Алексей
                    second_name: Дмитриевич
                    last_name: Иванов
                    full_name: 'Иванов Алексей Дмитриевич'
                    email: student@institute.local
                    email_verified_at: '2026-05-16T12:00:00+00:00'
                    phone: '+79001234567'
                    is_active: true
                    default_path: /api/student/results
                    student_profile:
                      student_id_number: ST-2024-0001
                      group:
                        id: 1
                        name: ИВТ-401
                        education_form: full_time
                        education_form_label: Очная
                        course: 4
                    created_at: '2026-05-16T12:00:00+00:00'
                    updated_at: '2026-05-16T12:10:00+00:00'
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 3
                      role:
                        type: string
                        example: student
                      role_label:
                        type: string
                        example: Студент
                      first_name:
                        type: string
                        example: Алексей
                      second_name:
                        type: string
                        example: Дмитриевич
                      last_name:
                        type: string
                        example: Иванов
                      full_name:
                        type: string
                        example: 'Иванов Алексей Дмитриевич'
                      email:
                        type: string
                        example: student@institute.local
                      email_verified_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      phone:
                        type: string
                        example: '+79001234567'
                      is_active:
                        type: boolean
                        example: true
                      default_path:
                        type: string
                        example: /api/student/results
                      student_profile:
                        type: object
                        properties:
                          student_id_number:
                            type: string
                            example: ST-2024-0001
                          group:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 1
                              name:
                                type: string
                                example: ИВТ-401
                              education_form:
                                type: string
                                example: full_time
                              education_form_label:
                                type: string
                                example: Очная
                              course:
                                type: integer
                                example: 4
                      created_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-16T12:10:00+00:00'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Необходима авторизация.'
                properties:
                  message:
                    type: string
                    example: 'Необходима авторизация.'
      tags:
        - Общее
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                last_name:
                  type: string
                  description: Фамилия.
                  example: Иванов
                first_name:
                  type: string
                  description: Имя.
                  example: Иван
                second_name:
                  type: string
                  description: Отчество.
                  example: Иванович
                phone:
                  type: string
                  description: Телефон.
                  example: '+79001234567'
  /api/profile/password:
    put:
      summary: 'Смена пароля'
      operationId: ''
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Пароль успешно изменён.'
                properties:
                  message:
                    type: string
                    example: 'Пароль успешно изменён.'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Необходима авторизация.'
                properties:
                  message:
                    type: string
                    example: 'Необходима авторизация.'
      tags:
        - Общее
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                  description: 'Текущий пароль.'
                  example: old-password
                password:
                  type: string
                  description: 'Новый пароль (не менее 8 символов).'
                  example: new-password
                password_confirmation:
                  type: string
                  description: 'Подтверждение нового пароля.'
                  example: new-password
              required:
                - current_password
                - password
                - password_confirmation
  /api/profile/email:
    post:
      summary: 'Смена email'
      operationId: Email
      description: 'Сохраняет новый адрес в `new_email` и отправляет письмо с подтверждением. Текущий `email` не меняется, пока пользователь не перейдёт по ссылке из письма.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Письмо с подтверждением отправлено на новый адрес.'
                  user:
                    id: 2
                    role: teacher
                    role_label: Преподаватель
                    first_name: Иван
                    second_name: Сергеевич
                    last_name: Петров
                    full_name: 'Петров Иван Сергеевич'
                    email: teacher@institute.local
                    new_email: new.teacher@institute.local
                    email_verified_at: null
                    phone: null
                    is_active: true
                    default_path: /api/gradebooks
                    gradebooks_count: 2
                    created_at: '2026-05-16T12:00:00+00:00'
                    updated_at: '2026-05-16T12:15:00+00:00'
                properties:
                  message:
                    type: string
                    example: 'Письмо с подтверждением отправлено на новый адрес.'
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 2
                      role:
                        type: string
                        example: teacher
                      role_label:
                        type: string
                        example: Преподаватель
                      first_name:
                        type: string
                        example: Иван
                      second_name:
                        type: string
                        example: Сергеевич
                      last_name:
                        type: string
                        example: Петров
                      full_name:
                        type: string
                        example: 'Петров Иван Сергеевич'
                      email:
                        type: string
                        example: teacher@institute.local
                      new_email:
                        type: string
                        example: new.teacher@institute.local
                      email_verified_at:
                        type: string
                        example: null
                      phone:
                        type: string
                        example: null
                      is_active:
                        type: boolean
                        example: true
                      default_path:
                        type: string
                        example: /api/gradebooks
                      gradebooks_count:
                        type: integer
                        example: 2
                      created_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-16T12:15:00+00:00'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Необходима авторизация.'
                properties:
                  message:
                    type: string
                    example: 'Необходима авторизация.'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Этот email уже используется.'
                  errors:
                    email:
                      - 'Этот email уже используется.'
                properties:
                  message:
                    type: string
                    example: 'Этот email уже используется.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'Этот email уже используется.'
                        items:
                          type: string
      tags:
        - Общее
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Новый email.'
                  example: new.user@example.com
                password:
                  type: string
                  description: 'Текущий пароль.'
                  example: password
              required:
                - email
                - password
  '/api/email/verify/{id}/{hash}':
    get:
      summary: 'Подтверждение email'
      operationId: Email
      description: 'Ссылка из письма (signed URL). При смене почты переносит `new_email` в `email` и сбрасывает `new_email`.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Email успешно подтверждён.'
                  user:
                    id: 2
                    role: teacher
                    role_label: Преподаватель
                    first_name: Иван
                    second_name: Сергеевич
                    last_name: Петров
                    full_name: 'Петров Иван Сергеевич'
                    email: new.teacher@institute.local
                    email_verified_at: '2026-05-16T12:20:00+00:00'
                    phone: null
                    is_active: true
                    default_path: /api/gradebooks
                    gradebooks_count: 2
                    created_at: '2026-05-16T12:00:00+00:00'
                    updated_at: '2026-05-16T12:20:00+00:00'
                properties:
                  message:
                    type: string
                    example: 'Email успешно подтверждён.'
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 2
                      role:
                        type: string
                        example: teacher
                      role_label:
                        type: string
                        example: Преподаватель
                      first_name:
                        type: string
                        example: Иван
                      second_name:
                        type: string
                        example: Сергеевич
                      last_name:
                        type: string
                        example: Петров
                      full_name:
                        type: string
                        example: 'Петров Иван Сергеевич'
                      email:
                        type: string
                        example: new.teacher@institute.local
                      email_verified_at:
                        type: string
                        example: '2026-05-16T12:20:00+00:00'
                      phone:
                        type: string
                        example: null
                      is_active:
                        type: boolean
                        example: true
                      default_path:
                        type: string
                        example: /api/gradebooks
                      gradebooks_count:
                        type: integer
                        example: 2
                      created_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-16T12:20:00+00:00'
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'This action is unauthorized.'
                properties:
                  message:
                    type: string
                    example: 'This action is unauthorized.'
      tags:
        - Общее
      security: []
    parameters:
      -
        in: path
        name: id
        description: 'ID пользователя.'
        example: 1
        required: true
        schema:
          type: integer
      -
        in: path
        name: hash
        description: 'SHA1 хеш email для подтверждения.'
        example: abc...
        required: true
        schema:
          type: string
  /api/student/results:
    get:
      summary: Результаты
      operationId: ''
      description: 'Список оценок текущего студента. Доступно только при `user.role = student`.'
      parameters:
        -
          in: query
          name: semester
          description: 'Фильтр по семестру.'
          example: 2025-осень
          required: false
          schema:
            type: string
            description: 'Фильтр по семестру.'
            example: 2025-осень
        -
          in: query
          name: per_page
          description: 'Количество записей на странице.'
          example: 20
          required: false
          schema:
            type: integer
            description: 'Количество записей на странице.'
            example: 20
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      student_name: 'Иванов Алексей Дмитриевич'
                      group_name: ИВТ-401
                      semester: '1'
                      module1_score: '42.00'
                      module2_score: '45.00'
                      total_score: '87.00'
                      final_grade: Отлично
                      gradebook:
                        id: 1
