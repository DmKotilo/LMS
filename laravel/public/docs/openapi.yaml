                                type: integer
                                example: 4
                      created_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Необходима авторизация.'
                properties:
                  message:
                    type: string
                    example: 'Необходима авторизация.'
      tags:
        - Общее
    patch:
      summary: 'Обновление профиля'
      operationId: ''
      description: 'Можно изменить ФИО и телефон. Смена email: `POST /api/profile/email` (пароль + новый email, подтверждение по ссылке из письма).'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 3
                    role: student
                    role_label: Студент
                    first_name: Алексей
                    second_name: Дмитриевич
                    last_name: Иванов
                    full_name: 'Иванов Алексей Дмитриевич'
                    email: student@institute.local
                    email_verified_at: '2026-05-16T12:00:00+00:00'
                    phone: '+79001234567'
                    is_active: true
                    default_path: /api/student/results
                    student_profile:
                      student_id_number: ST-2024-0001
                      group:
                        id: 1
                        name: ИВТ-401
                        education_form: full_time
                        education_form_label: Очная
                        course: 4
                    created_at: '2026-05-16T12:00:00+00:00'
                    updated_at: '2026-05-16T12:10:00+00:00'
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 3
                      role:
                        type: string
                        example: student
                      role_label:
                        type: string
                        example: Студент
                      first_name:
                        type: string
                        example: Алексей
                      second_name:
                        type: string
                        example: Дмитриевич
                      last_name:
                        type: string
                        example: Иванов
                      full_name:
                        type: string
                        example: 'Иванов Алексей Дмитриевич'
                      email:
                        type: string
                        example: student@institute.local
                      email_verified_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      phone:
                        type: string
                        example: '+79001234567'
                      is_active:
                        type: boolean
                        example: true
                      default_path:
                        type: string
                        example: /api/student/results
                      student_profile:
                        type: object
                        properties:
                          student_id_number:
                            type: string
                            example: ST-2024-0001
                          group:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 1
                              name:
                                type: string
                                example: ИВТ-401
                              education_form:
                                type: string
                                example: full_time
                              education_form_label:
                                type: string
                                example: Очная
                              course:
                                type: integer
                                example: 4
                      created_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-16T12:10:00+00:00'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Необходима авторизация.'
                properties:
                  message:
                    type: string
                    example: 'Необходима авторизация.'
      tags:
        - Общее
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                last_name:
                  type: string
                  description: Фамилия.
                  example: Иванов
                first_name:
                  type: string
                  description: Имя.
                  example: Иван
                second_name:
                  type: string
                  description: Отчество.
                  example: Иванович
                phone:
                  type: string
                  description: Телефон.
                  example: '+79001234567'
  /api/profile/password:
    put:
      summary: 'Смена пароля'
      operationId: ''
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Пароль успешно изменён.'
                properties:
                  message:
                    type: string
                    example: 'Пароль успешно изменён.'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Необходима авторизация.'
                properties:
                  message:
                    type: string
                    example: 'Необходима авторизация.'
      tags:
        - Общее
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                  description: 'Текущий пароль.'
                  example: old-password
                password:
                  type: string
                  description: 'Новый пароль (не менее 8 символов).'
                  example: new-password
                password_confirmation:
                  type: string
                  description: 'Подтверждение нового пароля.'
                  example: new-password
              required:
                - current_password
                - password
                - password_confirmation
  /api/profile/email:
    post:
      summary: 'Смена email'
      operationId: Email
      description: 'Сохраняет новый адрес в `new_email` и отправляет письмо с подтверждением. Текущий `email` не меняется, пока пользователь не перейдёт по ссылке из письма.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Письмо с подтверждением отправлено на новый адрес.'
                  user:
                    id: 2
                    role: teacher
                    role_label: Преподаватель
                    first_name: Иван
                    second_name: Сергеевич
                    last_name: Петров
                    full_name: 'Петров Иван Сергеевич'
                    email: teacher@institute.local
                    new_email: new.teacher@institute.local
                    email_verified_at: null
                    phone: null
                    is_active: true
                    default_path: /api/gradebooks
                    gradebooks_count: 2
                    created_at: '2026-05-16T12:00:00+00:00'
                    updated_at: '2026-05-16T12:15:00+00:00'
                properties:
                  message:
                    type: string
                    example: 'Письмо с подтверждением отправлено на новый адрес.'
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 2
                      role:
                        type: string
                        example: teacher
                      role_label:
                        type: string
                        example: Преподаватель
                      first_name:
                        type: string
                        example: Иван
                      second_name:
                        type: string
                        example: Сергеевич
                      last_name:
                        type: string
                        example: Петров
                      full_name:
                        type: string
                        example: 'Петров Иван Сергеевич'
                      email:
                        type: string
                        example: teacher@institute.local
                      new_email:
                        type: string
                        example: new.teacher@institute.local
                      email_verified_at:
                        type: string
                        example: null
                      phone:
                        type: string
                        example: null
                      is_active:
                        type: boolean
                        example: true
                      default_path:
                        type: string
                        example: /api/gradebooks
                      gradebooks_count:
                        type: integer
                        example: 2
                      created_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-16T12:15:00+00:00'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Необходима авторизация.'
                properties:
                  message:
                    type: string
                    example: 'Необходима авторизация.'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Этот email уже используется.'
                  errors:
                    email:
                      - 'Этот email уже используется.'
                properties:
                  message:
                    type: string
                    example: 'Этот email уже используется.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'Этот email уже используется.'
                        items:
                          type: string
      tags:
        - Общее
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Новый email.'
                  example: new.user@example.com
                password:
                  type: string
                  description: 'Текущий пароль.'
                  example: password
              required:
                - email
                - password
  '/api/email/verify/{id}/{hash}':
    get:
      summary: 'Подтверждение email'
      operationId: Email
      description: 'Ссылка из письма (signed URL). При смене почты переносит `new_email` в `email` и сбрасывает `new_email`.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Email успешно подтверждён.'
                  user:
                    id: 2
                    role: teacher
                    role_label: Преподаватель
                    first_name: Иван
                    second_name: Сергеевич
                    last_name: Петров
                    full_name: 'Петров Иван Сергеевич'
                    email: new.teacher@institute.local
                    email_verified_at: '2026-05-16T12:20:00+00:00'
                    phone: null
                    is_active: true
                    default_path: /api/gradebooks
                    gradebooks_count: 2
                    created_at: '2026-05-16T12:00:00+00:00'
                    updated_at: '2026-05-16T12:20:00+00:00'
                properties:
                  message:
                    type: string
                    example: 'Email успешно подтверждён.'
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 2
                      role:
                        type: string
                        example: teacher
                      role_label:
                        type: string
                        example: Преподаватель
                      first_name:
                        type: string
                        example: Иван
                      second_name:
                        type: string
                        example: Сергеевич
                      last_name:
                        type: string
                        example: Петров
                      full_name:
                        type: string
                        example: 'Петров Иван Сергеевич'
                      email:
                        type: string
                        example: new.teacher@institute.local
                      email_verified_at:
                        type: string
                        example: '2026-05-16T12:20:00+00:00'
                      phone:
                        type: string
                        example: null
                      is_active:
                        type: boolean
                        example: true
                      default_path:
                        type: string
                        example: /api/gradebooks
                      gradebooks_count:
                        type: integer
                        example: 2
                      created_at:
                        type: string
                        example: '2026-05-16T12:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-16T12:20:00+00:00'
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'This action is unauthorized.'
                properties:
                  message:
                    type: string
                    example: 'This action is unauthorized.'
      tags:
        - Общее
      security: []
    parameters:
      -
        in: path
        name: id
        description: 'ID пользователя.'
        example: 1
        required: true
        schema:
          type: integer
      -
        in: path
        name: hash
        description: 'SHA1 хеш email для подтверждения.'
        example: abc...
        required: true
        schema:
          type: string
  /api/student/summary:
    get:
      summary: 'Сводка студента'
      operationId: ''
      description: 'Карточка студента + агрегированные показатели (кол-во дисциплин, средний МРС, средний итог).'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    student:
                      id: 3
                      role: student
                      role_label: Студент
                      first_name: Полина
                      second_name: Васильевна
                      last_name: Юсина
                      full_name: 'Юсина Полина Васильевна'
                      email: student@institute.local
                      email_verified_at: '2026-05-16T12:00:00+00:00'
                      phone: null
                      is_active: true
                      default_path: /api/student/results
                      student_profile:
                        student_id_number: ST-2024-0001
                        group:
                          id: 1
                          name: ДБ2401
                          education_form: full_time
                          education_form_label: Очная
                          course: 2
                      created_at: '2026-05-16T12:00:00+00:00'
                      updated_at: '2026-05-16T12:00:00+00:00'
                    stats:
                      disciplines_count: 2
                      avg_mrs: 62.5
